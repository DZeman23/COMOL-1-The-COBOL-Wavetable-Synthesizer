# COMOL-FX Stereo Processor - Preset Template File
# PATCH: I-13: NosferatuPad
# Edit values below and load back with 'Load Template'.

[Meta]
cobol_path = C:/Path/To/Project/Sine Generator/COMOLFX.cbl
output_dir = C:/Path/To/Project/Sine Generator/bin

[Preset_1]
# TONE A: The Blood (Growler)
# Drive pulled back to 0.75 to preserve the pitch of the chords.
# Reverb slightly tightened so fast staccato strikes don't blur into noise.
# Forms the aggressive, mechanical pulse of the pad.
fx-spec-freq = 0.70000
fx-spec-q = 0.50000
fx-spec-gain = -0.25
fx-drive-amount = 0.75
fx-phaser-rate = 0.000
